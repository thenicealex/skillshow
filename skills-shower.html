          '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>'
        $('themeBtn').innerHTML =
          `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${t === 'dark' ? sun : moon}</svg>`
      }
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t)
        localStorage.setItem('cse-theme', t)
        setThemeIcon(t)
      }
      applyTheme(localStorage.getItem('cse-theme') || 'dark')
      $('themeBtn').addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme')
        applyTheme(cur === 'dark' ? 'light' : 'dark')
      })

      // ---------- File entry normalization ----------
      // Each entry: { path: "a/b/SKILL.md", size, lastModified, getText():Promise<string> }

      // Normalize path separators to forward slashes
      function normalizePath(path) {
        return path.replace(/\\/g, '/')
      }

      async function filesFromPicker() {
        const dirHandle = await window.showDirectoryPicker()
        const out = []
        async function walk(handle, prefix) {
          for await (const [name, entry] of handle.entries()) {
            const path = normalizePath(prefix ? prefix + '/' + name : name)
            if (entry.kind === 'directory') await walk(entry, path)
            else
              out.push({
                path,
                size: 0,
                lastModified: 0,
                _handle: entry,
                async getText() {
                  const f = await entry.getFile()
                  this.size = f.size
                  this.lastModified = f.lastModified
                  return f.text()
                }
              })
          }
        }
        await walk(dirHandle, '')
        // second pass to fill size/mtime without reading content
        await Promise.all(
          out.map(async (e) => {
            const f = await e._handle.getFile()
            e.size = f.size
            e.lastModified = f.lastModified
          })
        )
        return { files: out, dirName: dirHandle.name }
      }

      function filesFromInput(fileList) {
        const out = []
        for (const f of fileList) {
          const rel = normalizePath(f.webkitRelativePath || f.name)
          out.push({
            path: rel,
            size: f.size,
            lastModified: f.lastModified,
            async getText() {
              return f.text()
            }
          })
        }
        return out
      }

      async function filesFromDrop(items) {
        // returns normalized entries via webkitGetAsEntry recursion
        const MAX_FILES = 1000
        const out = []
        let fileCount = 0
        let limitWarned = false
        function readEntry(entry, prefix) {
          return new Promise((resolve) => {
            if (entry.isFile) {
              entry.file(
                (file) => {
                  fileCount++
                  if (fileCount > MAX_FILES) {
                    if (!limitWarned) {
                      showToast(`已限制扫描前 ${MAX_FILES} 个文件`)
                      limitWarned = true
                    }
                    resolve()
                    return
                  }
                  const path = normalizePath(
                    prefix ? prefix + '/' + file.name : file.name
                  )
                  out.push({
                    path,
                    size: file.size,
                    lastModified: file.lastModified,
                    async getText() {
                      return file.text()
                    }
                  })
                  resolve()
                },
                () => resolve()
              )
            } else if (entry.isDirectory) {
              const reader = entry.createReader()
              const all = []
              const readBatch = () =>
                reader.readEntries(
                  (ents) => {
                    if (!ents.length) {
                      Promise.all(
                        all.map((e) =>
                          readEntry(
                            e,
                            prefix ? prefix + '/' + entry.name : entry.name
                          )
                        )
                      ).then(() => resolve())
                    } else {
                      all.push(...ents)
                      readBatch()
                    }
                  },
                  () => resolve()
                )
              readBatch()
            } else resolve()
          })
        }
        const tasks = []
        for (const it of items) {
          const entry = it.webkitGetAsEntry ? it.webkitGetAsEntry() : null
          if (entry) tasks.push(readEntry(entry, ''))
        }
        await Promise.all(tasks)
        return out
      }

      // ---------- Skill parsing ----------
      function stripQuotes(v) {
        if (typeof v !== 'string') return v
        return v.replace(/^["']|["']$/g, '')
      }
      function parseFrontmatter(text) {
        const m = text.match(/^---\s*\n([\s\S]*?)\n---/)
        if (!m) return {}
        const fm = {}
        const block = m[1]
        const lines = block.split('\n')
        let i = 0
        while (i < lines.length) {
          const line = lines[i]
          const keyMatch = line.match(/^([A-Za-z0-9_-]+):\s*(.*)/)
          if (!keyMatch) {
            i++
            continue
          }
          const key = keyMatch[1].trim()
          let value = keyMatch[2]
          // Handle list values (array with "- " prefix)
          if (
            value === '' &&
            i + 1 < lines.length &&
            /^\s+- /.test(lines[i + 1])
          ) {
            const list = []
            i++
            while (i < lines.length && /^\s+- /.test(lines[i])) {
              list.push(stripQuotes(lines[i].replace(/^\s+- /, '').trim()))
              i++
            }
            fm[key] = list
            continue
          }
          // Handle multiline strings (">>" or "|" block scalars)
          if (
            (value === '>' ||
              value === '|' ||
              value.endsWith('>') ||
              value.endsWith('|')) &&
            i + 1 < lines.length &&
            /^\s+/.test(lines[i + 1])
          ) {
            const buf = []
            const indent = lines[i + 1].match(/^(\s+)/)?.[1].length || 2
            i++
            while (
              i < lines.length &&
              (lines[i].startsWith(' '.repeat(indent)) ||
                lines[i].trim() === '')
            ) {
              buf.push(lines[i].replace(/^\s{1,}/, ''))
              i++
            }
            fm[key] = stripQuotes(
              buf.join(value.startsWith('>') ? ' ' : '\n').trim()
            )
            continue
          }
          fm[key] = stripQuotes(value.trim())
          i++
        }
        return fm
      }

      function extractKeywords(text) {
        // 1. explicit "## Triggers" / triggers section bullets
        const sec = text.match(
          /#{1,4}\s*(triggers?|触发\w*)\b[\s\S]*?\n([\s\S]*?)(?=\n#{1,4}\s|$)/i
        )
        if (sec) {
          const list = sec[2]
            .split('\n')
            .map((s) => s.replace(/^[\s*>\-#]+/, '').trim())
            .filter(Boolean)
          if (list.length) return list.slice(0, 12)
        }
        // 2. inline "Triggers:" / "Keywords:" / "触发：" line
        const inline = text.match(
          /(?:triggers?|keywords?|触发[：:])\s*[:：]\s*(.+)/i
        )
        if (inline) {
          const parts = inline[1]
            .split(/[，,、|]/)
            .map((s) => s.trim())
            .filter(Boolean)
          if (parts.length) return parts.slice(0, 12)
        }
        // 3. frontmatter keywords field (may be array or string)
        const fm = parseFrontmatter(text)
        if (fm.keywords) {
          if (Array.isArray(fm.keywords)) return fm.keywords.slice(0, 12)
          return fm.keywords
            .split(/[，,、]/)
            .map((s) => s.trim())
            .filter(Boolean)
            .slice(0, 12)
        }
        // 4. hashtags (ignore anything inside code fences)
        const noCode = text.replace(/```[\s\S]*?```/g, '')
        const tags = [
          ...noCode.matchAll(/#([A-Za-z0-9_\u4e00-\u9fa5\-]+)/g)
        ].map((m) => m[1])
        if (tags.length) return [...new Set(tags)].slice(0, 12)
        return []
      }

      function parseSkill(text, fallbackName) {
        const fm = parseFrontmatter(text)
        let name = (fm.name || '').trim() || fallbackName
        let description = (fm.description || '').trim()
        if (!description) {
          for (const line of text.split('\n')) {
            const t = line.trim()
            if (
              t &&
              !t.startsWith('#') &&
              !t.startsWith('---') &&
              !t.startsWith('```') &&
              !/^[A-Za-z0-9_-]+:/.test(t)
            ) {
              description = t
              break
            }
          }
        }
        const keywords = extractKeywords(text)
        return { name, description, keywords }
      }

      // ---------- Source provenance ----------
      const SRC = {
        codex: { label: '.codex', color: '#7c8cff' },
        agent: { label: '.agent', color: '#34d399' },
        claude: { label: '.claude', color: '#f59e0b' },
        other: { label: '本地', color: 'var(--text-faint)' }
      }
      function sourceOf(dir) {
        if (dir.includes('.codex')) return SRC.codex
        if (dir.includes('.agent')) return SRC.agent
        if (dir.includes('.claude')) return SRC.claude
        return SRC.other
      }

      // ---------- Build skills from files ----------
      async function buildSkills(files, rootLabel) {
        const skillDirs = new Set()
        const skillFile = {}
        for (const f of files) {
          const parts = f.path.split('/')
          if (parts[parts.length - 1] === 'SKILL.md') {
            const dir = parts.slice(0, -1).join('/')
            skillDirs.add(dir)
            skillFile[dir] = f
          }
        }
        const dirs = [...skillDirs]
        // Parallelize reading all SKILL.md files
        const texts = await Promise.all(
          dirs.map((dir) => skillFile[dir].getText())
        )
        const skills = dirs.map((dir, i) => {
          const folderName = dir.split('/').pop() || dir
          const text = texts[i]
          const parsed = parseSkill(text, folderName)
          // gather files belonging to this skill dir (direct + nested)
          let totalSize = 0,
            lastMod = 0,
            fileCount = 0
          for (const fl of files) {
            if (
              fl.path === dir + '/SKILL.md' ||
              fl.path.startsWith(dir + '/')
            ) {
              totalSize += fl.size
              fileCount++
              if (fl.lastModified > lastMod) lastMod = fl.lastModified
            }
          }
          return {
            dir,
            folderName,
            name: parsed.name,
            description: parsed.description,
            keywords: parsed.keywords,
            size: totalSize,
            fileCount,
            lastModified: lastMod,
            content: text
          }
        })
        return skills
      }

      // ---------- Rendering ----------
      function fmtSize(bytes) {
        if (!bytes) return '0 B'
        const u = ['B', 'KB', 'MB', 'GB']
        const i = Math.floor(Math.log(bytes) / Math.log(1024))
        return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + ' ' + u[i]
      }
      function fmtDate(ts) {
        if (!ts) return '—'
        const d = new Date(ts)
        const p = (n) => String(n).padStart(2, '0')
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`
      }

      function renderGrid(list, animate) {
        const grid = $('grid')
        const empty = $('emptyState')
        grid.innerHTML = ''
        if (!list.length) {
          grid.classList.add('hidden')
          empty.classList.remove('hidden')
          const q = $('searchInput').value.trim()
          const msg = $('emptyMsg'),
            sub = $('emptySub'),
            big = empty.querySelector('.big')
          if (q) {
            big.textContent = '🔍'
            msg.innerHTML = `没有与 “${esc(q)}” 匹配的 skills`
            sub.textContent = '试试其他关键词，或清除搜索'
          } else {
            big.textContent = '📂'
            msg.innerHTML =
              '还没有选择待导入的目录。请选择一个包含 <b>SKILL.md</b> 的目录开始扫描。'
            sub.textContent = ''
          }
          return
        }
        grid.classList.remove('hidden')
        empty.classList.add('hidden')
        const frag = document.createDocumentFragment()
        list.forEach((s, i) => {
          const src = sourceOf(s.dir)
          const card = document.createElement('div')
          card.className = 'card' + (animate ? ' anim' : '')
          if (animate) card.style.animationDelay = Math.min(i * 0.04, 0.4) + 's'
          card.tabIndex = 0
          card.setAttribute('role', 'button')
          card.setAttribute('aria-label', '查看 skill：' + s.name)
          const tags = s.keywords.length
            ? s.keywords
                .slice(0, 5)
                .map((k) => `<span class="tag">${esc(k)}</span>`)
                .join('')
            : `<span class="tag muted">无触发词</span>`
          card.innerHTML = `
      <div class="card-top">
        <div class="name">${esc(s.name)}</div>
        <span class="src" style="--sc:${src.color}">${src.label}</span>
      </div>
      <div class="desc" title="${esc(s.description || '（无描述）')}">${esc(s.description || '（无描述）')}</div>
      <div class="tags">${tags}</div>
      <div class="foot"><span>${fmtSize(s.size)} · ${s.fileCount} 文件</span><span>${fmtDate(s.lastModified)}</span></div>
    `
          card.addEventListener('click', () => openModal(s))
          frag.appendChild(card)
        })
        grid.appendChild(frag)
      }

      function updateStatus(rootLabel) {
        $('pathLabel').innerHTML = `已扫描：<b>${esc(rootLabel)}</b>`
        $('countBadge').textContent = `${SKILLS.length} 个 skills`
        const total = SKILLS.reduce((a, s) => a + s.size, 0)
        $('sizeMeta').textContent = `共 ${fmtSize(total)}`
        // per-source legend
        const counts = {}
        for (const s of SKILLS) {
          const k = sourceOf(s.dir).label
          counts[k] = (counts[k] || 0) + 1
        }
        const meta = $('srcMeta')
        const entries = Object.entries(counts)
        if (entries.length && SKILLS.length) {
          meta.classList.remove('hidden')
          meta.innerHTML = entries
            .map(([k, c]) => {
              const color =
                k === '.codex'
                  ? SRC.codex.color
                  : k === '.agent'
                    ? SRC.agent.color
                    : k === '.claude'
                      ? SRC.claude.color
                      : SRC.other.color
              return `<span class="dot" style="--dc:${color}"><i></i>${esc(k)} ${c}</span>`
            })
            .join('')
        } else {
          meta.classList.add('hidden')
        }
      }

      // ---------- Filtering & sorting ----------
      function applyFilter(animate) {
        const q = $('searchInput').value.trim().toLowerCase()
        const sort = $('sortSel').value
        let list = SKILLS.slice()
        if (q) {
          list = list.filter((s) => {
            const hay = (
              s.name +
              ' ' +
              s.description +
              ' ' +
              s.keywords.join(' ') +
              ' ' +
              s.folderName
            ).toLowerCase()
            return hay.includes(q)
          })
        }
        list.sort((a, b) => {
          if (sort === 'size') return b.size - a.size
          if (sort === 'date') return b.lastModified - a.lastModified
          return a.name.localeCompare(b.name)
        })
        renderGrid(list, !!animate)
      }

      // ---------- Markdown (minimal, safe) ----------
      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }
      function inlineMd(s) {
        s = esc(s)
        s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`)
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
        s = s.replace(
          /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>'
        )
        return s
      }
      function renderMarkdown(md) {
        const lines = md.replace(/\r\n/g, '\n').split('\n')
        let html = '',
          i = 0
        while (i < lines.length) {
          let line = lines[i]
          // code fence
          if (/^```/.test(line)) {
            const lang = line.replace(/```/, '').trim()
            const buf = []
            i++
            while (i < lines.length && !/^```/.test(lines[i])) {
              buf.push(lines[i])
              i++
            }
            i++
            html += `<pre><code>${esc(buf.join('\n'))}</code></pre>`
            continue
          }
          // table
          if (
            line.includes('|') &&
            i + 1 < lines.length &&
            /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1]) &&
            lines[i + 1].includes('-')
          ) {
            const splitRow = (r) =>
              r
                .replace(/^\s*\|/, '')
                .replace(/\|\s*$/, '')
                .split('|')
                .map((c) => c.trim())
            const head = splitRow(line)
            i += 2
            const rows = []
            while (i < lines.length && lines[i].includes('|')) {
              rows.push(splitRow(lines[i]))
              i++
            }
            let t =
              '<table><thead><tr>' +
              head.map((h) => `<th>${inlineMd(h)}</th>`).join('') +
              '</tr></thead><tbody>'
            for (const r of rows)
              t +=
                '<tr>' +
                r.map((c) => `<td>${inlineMd(c)}</td>`).join('') +
                '</tr>'
            t += '</tbody></table>'
            html += t
            continue
          }
          // heading
          let h = line.match(/^(#{1,6})\s+(.*)$/)
          if (h) {
            const lvl = h[1].length
            html += `<h${lvl}>${inlineMd(h[2])}</h${lvl}>`
            i++
            continue
          }
          // hr
          if (/^(\*{3,}|-{3,}|_{3,})$/.test(line.trim())) {
            html += '<hr>'
            i++
            continue
          }
          // blockquote
          if (/^>\s?/.test(line)) {
            const buf = []
            while (i < lines.length && /^>\s?/.test(lines[i])) {
              buf.push(lines[i].replace(/^>\s?/, ''))
              i++
            }
            html += `<blockquote>${inlineMd(buf.join(' '))}</blockquote>`
            continue
          }
          // unordered list
          if (/^\s*[-*+]\s+/.test(line)) {
            const buf = []
            while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
              buf.push(lines[i].replace(/^\s*[-*+]\s+/, ''))
              i++
            }
            html +=
              '<ul>' +
              buf.map((b) => `<li>${inlineMd(b)}</li>`).join('') +
              '</ul>'
            continue
          }
          // ordered list
          if (/^\s*\d+\.\s+/.test(line)) {
            const buf = []
            while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
              buf.push(lines[i].replace(/^\s*\d+\.\s+/, ''))
              i++
            }
            html +=
              '<ol>' +
              buf.map((b) => `<li>${inlineMd(b)}</li>`).join('') +
              '</ol>'
            continue
          }
          // blank
          if (!line.trim()) {
            i++
            continue
          }
          // paragraph (merge consecutive non-special lines)
          const buf = [line]
          i++
          while (
            i < lines.length &&
            lines[i].trim() &&
            !/^(#{1,6}\s|>\s?|\s*[-*+]\s|\s*\d+\.\s|```|(\*{3,}|-{3,}|_{3,})$)/.test(
              lines[i]
            ) &&
            !lines[i].includes('|')
          ) {
            buf.push(lines[i])
            i++
          }
          html += `<p>${inlineMd(buf.join(' '))}</p>`
        }
        return html
      }

      // ---------- Modal ----------
      let CURRENT = null
      function openModal(s) {
        CURRENT = s
        const src = sourceOf(s.dir)
        $('mTitle').textContent = s.name
        // Display path with correct separator for platform
        $('mPath').textContent = s.dir + '/SKILL.md'
        const tags = s.keywords.length
          ? s.keywords.map((k) => `<span class="tag">${esc(k)}</span>`).join('')
          : `<span class="tag muted">无触发词</span>`
        $('mTags').innerHTML = tags
        $('mMeta').innerHTML = `
    <span class="mi"><span class="src" style="--sc:${src.color}">${src.label}</span></span>
    <span class="mi">📦 <b>${fmtSize(s.size)}</b></span>
    <span class="mi">📄 <b>${s.fileCount}</b> 个文件</span>
    <span class="mi">🕒 <b>${fmtDate(s.lastModified)}</b></span>
  `
        // strip leading YAML frontmatter for a cleaner read
        let body = s.content.replace(/^---\s*\n[\s\S]*?\n---\s*\n?/, '')
        $('mBody').innerHTML = renderMarkdown(body)
        $('overlay').classList.add('open')
      }
      function closeModal() {
        $('overlay').classList.remove('open')
      }
      $('closeBtn').addEventListener('click', closeModal)
      $('copyBtn').addEventListener('click', async () => {
        if (!CURRENT) return
        const btn = $('copyBtn')
        try {
          await navigator.clipboard.writeText(CURRENT.content)
          showToast('已复制 SKILL.md 到剪贴板', 'success')
          // Add a brief success animation
          btn.style.transform = 'scale(1.15)'
          setTimeout(() => (btn.style.transform = ''), 200)
        } catch {
          showToast('复制失败，请手动选择文本', 'error')
        }
      })
      $('overlay').addEventListener('click', (e) => {
        if (e.target === $('overlay')) closeModal()
      })
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal()
        if (e.key === '/' && document.activeElement !== $('searchInput')) {
          e.preventDefault()
          $('searchInput').focus()
        }
      })

      let toastTimer
      function showToast(msg, type = 'default') {
        const t = $('toast')
        t.textContent = msg
        t.className = 'toast' + (type !== 'default' ? ' ' + type : '')
        // Force reflow to restart animation
        void t.offsetWidth
        t.classList.add('show')
        clearTimeout(toastTimer)
        toastTimer = setTimeout(() => t.classList.remove('show'), 2200)
      }

      // Skeleton helpers
      function showSkeleton(count = 6) {
        const grid = $('grid')
        grid.innerHTML = ''
        grid.classList.remove('hidden')
        $('emptyState').classList.add('hidden')
        const frag = document.createDocumentFragment()
        for (let i = 0; i < count; i++) {
          const sk = document.createElement('div')
          sk.className = 'skeleton-card'
          sk.innerHTML = `
      <div class="sk-top">
        <div class="sk-title skeleton"></div>
        <div class="sk-badge skeleton"></div>
      </div>
      <div class="sk-desc">
        <div class="sk-line skeleton"></div>
        <div class="sk-line skeleton"></div>
        <div class="sk-line skeleton"></div>
      </div>
      <div class="sk-footer">
        <div class="sk-meta skeleton"></div>
        <div class="sk-meta skeleton"></div>
      </div>
    `
          frag.appendChild(sk)
        }
        grid.appendChild(frag)
      }

      // ---------- Orchestration ----------
      async function ingest(files, rootLabel) {
        if (!files.length) return
        RAW_FILES = files
        $('spinner').classList.remove('hidden')
        $('pathLabel').innerHTML = `扫描中：<b>${esc(rootLabel)}</b> …`
        // Show skeleton while loading
        showSkeleton(Math.min(8, Math.ceil(files.length / 10)))
        try {
          SKILLS = await buildSkills(files, rootLabel)
        } catch (err) {
          console.error(err)
          showToast('解析 skills 时出错：' + err.message, 'error')
          return
        } finally {
          $('spinner').classList.add('hidden')
        }
        updateStatus(rootLabel)
        applyFilter(true)
        if (SKILLS.length > 0) {
          showToast(`成功加载 ${SKILLS.length} 个 skills`, 'success')
        }
      }

      async function chooseDirectory() {
        if (window.showDirectoryPicker) {
          try {
            const { files, dirName } = await filesFromPicker()
            await ingest(files, dirName || '已选目录')
            return
          } catch (e) {
            if (e.name === 'AbortError') return // user cancelled
            // fall through to input
          }
        }
        $('dirInput').click()
      }

      // Picker (File System Access API) with fallback to webkitdirectory input
      $('pickBtn').addEventListener('click', chooseDirectory)

      $('dirInput').addEventListener('change', async (e) => {
        const files = filesFromInput(e.target.files)
        const root = files.length ? files[0].path.split('/')[0] : '已选目录'
        await ingest(files, root)
        e.target.value = ''
      })

      // Drag & drop
      const dz = $('dropzone')
      ;['dragenter', 'dragover'].forEach((ev) =>
        dz.addEventListener(ev, (e) => {
          e.preventDefault()
          dz.classList.add('drag')
        })
      )
      ;['dragleave', 'drop'].forEach((ev) =>
        dz.addEventListener(ev, (e) => {
          e.preventDefault()
          dz.classList.remove('drag')
        })
      )
      dz.addEventListener('drop', async (e) => {
        const items =
          e.dataTransfer && e.dataTransfer.items ? e.dataTransfer.items : []
        if (!items.length) return
        const files = await filesFromDrop(items)
        await ingest(files, '拖入的文件夹')
      })
      dz.addEventListener('click', chooseDirectory)
      dz.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return
        e.preventDefault()
        chooseDirectory()
      })

      // Search & sort
      $('searchInput').addEventListener('input', (e) => {
        $('clearBtn').classList.toggle('hidden', !e.target.value)
        applyFilter()
      })
      $('clearBtn').addEventListener('click', () => {
        $('searchInput').value = ''
        $('clearBtn').classList.add('hidden')
        applyFilter()
        $('searchInput').focus()
      })
      $('sortSel').addEventListener('change', () => applyFilter())

      // Keyboard navigation across cards
      $('grid').addEventListener('keydown', (e) => {
        const cards = [...$('grid').querySelectorAll('.card')]
        if (!cards.length) return
        const idx = cards.indexOf(document.activeElement)
        if (idx < 0) return
        let n = idx
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown')
          n = Math.min(cards.length - 1, idx + 1)
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')
          n = Math.max(0, idx - 1)
        else if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault()
          cards[idx].click()
          return
        } else return
        e.preventDefault()
        cards[n].focus()
      })

      // ---------- Platform detection & default paths ----------
      function detectPlatform() {
        const ua = navigator.userAgent
        if (ua.includes('Win')) return 'windows'
        if (ua.includes('Mac')) return 'mac'
        if (ua.includes('Linux')) return 'linux'
        return 'unix'
      }

      const DEFAULT_PATHS = {
        unix: ['~/.codex/skills/', '~/.agent/skills/', '~/.claude/skills/'],
        windows: [
          '%USERPROFILE%\\.codex\\skills\\',
          '%USERPROFILE%\\.agent\\skills\\',
          '%USERPROFILE%\\.claude\\skills\\'
        ]
      }

      function normalizePath(path) {
        // Convert Windows backslashes to forward slashes for consistency
        return path.replace(/\\/g, '/')
      }

      function formatPathForDisplay(path) {
        const platform = detectPlatform()
        if (platform === 'windows') {
          return path.replace(/\//g, '\\')
        }
        return path
      }

      // Quick-scan chips for default directories
      function openPicker(platform) {
        if (platform === 'custom') {
          if (window.showDirectoryPicker) {
            filesFromPicker()
              .then(({ files, dirName }) =>
                ingest(files, dirName || '已选目录')
              )
              .catch((e) => {
                if (e.name !== 'AbortError') $('dirInput').click()
              })
          } else {
            $('dirInput').click()
          }
          return
        }

        const paths = DEFAULT_PATHS[platform] || DEFAULT_PATHS.unix
        const label =
          platform === 'windows' ? 'Windows 默认目录' : 'Unix/macOS 默认目录'

        // Show instructions for manual selection
        showToast(`请使用"选择文件夹"按钮，选择 ${label}`, 'success')

        // Update status bar
        $('pathLabel').innerHTML = `请选择 <b>${label}</b> 中的任意一个目录`

        // Store the platform for later use
        window._currentPlatform = platform
      }

      // Update chip event listeners
      document.querySelectorAll('.chip').forEach((ch) => {
        ch.addEventListener('click', () => {
          const platform = ch.dataset.path
          if (
            platform === 'unix' ||
            platform === 'windows' ||
            platform === 'custom'
          ) {
            openPicker(platform)
          }
        })
      })

      // Load embedded default-directory snapshot (populated by scan-codex-skills.mjs)
      ;(function loadEmbedded() {
        const emb = document.getElementById('embedded-skills')
        if (emb && emb.textContent.trim()) {
          try {
            SKILLS = JSON.parse(emb.textContent)
            updateStatus(
              '默认目录（~/.codex/skills/ · ~/.agent/skills/ · ~/.claude/skills/）'
            )
            applyFilter(true)
          } catch (e) {
            console.warn('embedded skills parse failed', e)
          }
        }
      })()
    </script>
  </body>
</html>
